name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify sqlc generated code
        run: |
          go tool sqlc generate
          git diff --exit-code -- internal/db/generated

      - name: Reject runtime SQL construction
        run: |
          if grep -R -n -E '(^|[[:space:]])(query|q|sql)[[:space:]]*(\+=|(:=|=)[^;]*\+)' internal/store --include='*.go'; then
            echo "runtime SQL concatenation is forbidden; add a sqlc query instead"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Build
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Lint
        run: golangci-lint run ./...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -scan module
        working-directory: cmd/mnemo
