name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-X main.version=${{ github.ref_name }}" \
            -o mnemo-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/mnemo/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: mnemo-${{ matrix.goos }}-${{ matrix.goarch }}
