name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build scripts archive
        run: |
          tar -czf mnemo-scripts.tar.gz scripts/
          shasum -a 256 mnemo-scripts.tar.gz > mnemo-scripts.tar.gz.sha256

      - name: Upload scripts archive
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mnemo-scripts.tar.gz
            mnemo-scripts.tar.gz.sha256

  release:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-X main.version=${{ github.ref_name }}" \
            -o mnemo-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/mnemo/

      - name: Checksum
        run: |
          shasum -a 256 mnemo-${{ matrix.goos }}-${{ matrix.goarch }} \
            > mnemo-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mnemo-${{ matrix.goos }}-${{ matrix.goarch }}
            mnemo-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
